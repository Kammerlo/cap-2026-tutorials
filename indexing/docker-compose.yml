name: cardano-indexing-tutorial

services:
  # Yaci DevKit: a local Cardano devnet with built-in node, Ogmios, and viewer
  # Docs: https://devkit.yaci.xyz
  yaci-cli:
    image: bloxbean/yaci-cli:0.10.6
    ports:
      - "3001:3001"      # Cardano node N2N
      - "3333:3333"      # Cardano node N2C (socat)
      - "8090:8090"      # Submit API
      - "10000:10000"    # Cluster management API
      - "1337:1337"      # Ogmios
    volumes:
      - cluster-data:/clusters
    entrypoint: ["sleep", "infinity"]

  # Yaci Viewer: web UI to explore the local devnet
  yaci-viewer:
    image: bloxbean/yaci-viewer:0.10.6
    ports:
      - "5173:5173"
    environment:
      - PUBLIC_INDEXER_BASE_URL=http://yaci-cli:8080/api/v1
      - PUBLIC_INDEXER_CLIENT_BASE_URL=http://localhost:8080/api/v1
      - PUBLIC_INDEXER_WS_URL=ws://localhost:8080/ws/liveblocks
      - IS_DOCKER=true

  # PostgreSQL: persistent storage for our custom yaci-store indexer
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: indexer
      POSTGRES_USER: indexer
      POSTGRES_PASSWORD: indexer
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  cluster-data:
  pgdata:
